name: Controlla leak Juventus

on:
  workflow_dispatch: {}      # per lanciarlo a mano da Actions

permissions:
  contents: write

jobs:
  check-leaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui -u check_store.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_TOKEN: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check.py

      - name: Commit stato (flag + notizie viste)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .found-font-* .found-product-* .seen_news.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Aggiorna stato leak/notizie Juventus"
          git push
