name: Controlla leak Juventus

on:
  workflow_dispatch: {}      # per lanciarlo a mano da Actions

permissions:
  actions: write
  contents: write

jobs:
  check-leaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui -u check_store.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_TOKEN: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u check.py

      - name: Commit stato (flag + notizie viste)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .found-font-* .found-product-* .seen_news.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Aggiorna stato leak/notizie Juventus"
          git push

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/check.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
